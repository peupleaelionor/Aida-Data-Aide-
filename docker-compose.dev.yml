version: '3.9'

# Development overrides — run with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  postgres:
    ports:
      - '5432:5432'

  redis:
    ports:
      - '6379:6379'

  meilisearch:
    environment:
      - MEILI_ENV=development
    ports:
      - '7700:7700'
